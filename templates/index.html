
<!DOCTYPE html>
<html>
<head>
    <title>FTIR Analyzer</title>
</head>
<body>

    <h2>Upload FTIR CSV File</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Analyze</button>
    </form>

    <br><br>

    {% if plot_html %}
        <div>
            {{ plot_html|safe }}
        </div>
    {% endif %}

</body>
</html>
